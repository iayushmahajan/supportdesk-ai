services:
  postgres:
    image: postgres:16-alpine
    container_name: supportdesk_ai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: supportdesk_ai
      POSTGRES_USER: supportdesk_user
      POSTGRES_PASSWORD: supportdesk_password
    ports:
      - "5433:5432"
    volumes:
      - supportdesk_ai_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U supportdesk_user -d supportdesk_ai" ]
      interval: 5s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    container_name: supportdesk_ai_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: admin
      WEBHOOK_URL: http://localhost:5678/
      GENERIC_TIMEZONE: Europe/Berlin
    volumes:
      - supportdesk_ai_n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  supportdesk_ai_postgres_data:
  supportdesk_ai_n8n_data:
